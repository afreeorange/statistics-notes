version: 2.1

jobs:
  build:
    docker:
      - image: afreeorange/build:latest
    steps:
      - checkout

      - run:
          name: Submodule setup
          command: |
            git submodule init
            git submodule update

      - run:
          name: Building
          command: hugo

      - run:
          name: Deploying
          command: hugo deploy

# All because we want to use Contexts... 🤦‍♀️
workflows:
  version: 2
  build-notebook:
    jobs:
      - build:
          context: AWS
          filters:
            branches:
              only: master

