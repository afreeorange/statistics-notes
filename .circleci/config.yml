version: 2.1

jobs:
  build:
    docker:
      - image: afreeorange/build:latest
    steps:
      - checkout

      - run:
          name: Submodule setup
          command: |
            git submodule init
            git submodule update

      - run:
          name: Building
          command: hugo --minify

      - run:
          name: Deploying
          command: hugo deploy
